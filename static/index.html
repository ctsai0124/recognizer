<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會計月報辨識服務</title>
<style>
  :root{
    --ink:#1c2530; --soft:#55606c; --line:#d9dee4; --lineSoft:#eef1f4; --bg:#f6f7f9; --panel:#fff;
    --accent:#1f5c8b; --accentSoft:#e7f0f7; --ok:#1f7a4d; --okSoft:#e6f4ec; --okLine:#bfe0cd;
    --amber:#8a5a12; --amberSoft:#fbf1dc; --amberLine:#ecd8a8; --grey:#8a929b;
    --mono:"SFMono-Regular",Consolas,Menlo,monospace;
    --sans:"Segoe UI","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.6}
  .wrap{max-width:1080px;margin:0 auto;padding:26px 20px 90px}
  h1{font-size:21px;letter-spacing:1px;margin:0;border-bottom:2px solid var(--ink);padding-bottom:12px}
  .sub{color:var(--soft);font-size:13px;margin:6px 0 0}
  .bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:18px}
  .dz{border:1.6px dashed var(--line);border-radius:10px;padding:14px 18px;background:#fcfdfe;cursor:pointer;flex:1;min-width:260px}
  .dz.over{border-color:var(--accent);background:var(--accentSoft)}
  .dz .big{font-size:14.5px}.dz .s{font-size:12px;color:var(--soft)}
  label.ck{font-size:13px;color:var(--soft);display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap}
  button.act{border:1px solid var(--accent);background:var(--accent);color:#fff;padding:9px 18px;border-radius:7px;
    font-size:14px;cursor:pointer;font-family:var(--sans)}
  button.act:disabled{opacity:.45;cursor:not-allowed}
  .ocrTag{font-size:12px;color:var(--soft)}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
  .card .l{font-size:12px;color:var(--soft)}.card .v{font-size:22px;font-weight:600}
  .card .v.amber{color:var(--amber)}
  .sec{border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:20px;background:#fff}
  .sec .row{display:flex;align-items:center;gap:10px;padding:8px 13px;border-bottom:1px solid var(--lineSoft);font-size:14px}
  .sec .row:last-child{border-bottom:none}
  .sec .row .rng{font-family:var(--mono);font-size:12.5px;width:74px;flex:none;text-align:right;color:var(--accent)}
  .sec .row .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .dot.auto{background:var(--ok)}.dot.uncertain{background:var(--amber)}.dot.front{background:var(--grey)}
  .sec .row.uncertain{background:var(--amberSoft)}
  .sec .row .cand{margin-left:auto;font-size:11.5px;color:var(--amber)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .pg{border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff;display:flex;flex-direction:column}
  .pg img{width:100%;display:block;background:#eee;border-bottom:1px solid var(--lineSoft)}
  .pg .cap{padding:6px 8px}
  .pg .no{font-family:var(--mono);font-size:11px;color:var(--soft)}
  .pg .lb{font-size:12px;margin:2px 0 5px;line-height:1.35;min-height:32px}
  .pg select{width:100%;font-size:11.5px;padding:3px;border:1px solid var(--line);border-radius:5px;font-family:var(--sans)}
  .pg.k-text{outline:2px solid var(--okLine)}
  .pg.k-scan .lb,.pg.k-unknown .lb{color:var(--amber)}
  .pg .ocr{font-size:10px;color:#fff;background:var(--amber);border-radius:3px;padding:0 4px;margin-left:4px}
  .err{color:#b23b3b;font-size:13px;margin-top:10px}
  .foot{margin-top:40px;font-size:11.5px;color:#9aa4af;border-top:1px solid var(--line);padding-top:10px}
  h3{font-size:14px;letter-spacing:.5px;margin:22px 0 8px}
</style>
</head>
<body>
<div class="wrap">
  <h1>會計月報辨識服務</h1>
  <div class="sub">上傳一份月報（可為已合併的整份檔），系統逐頁辨識表頭、切出各表段落。抽不到字的掃描頁可開啟 OCR 輔助。結果供人工確認。</div>

  <div class="bar">
    <label class="dz" id="dz">
      <div class="big" id="fname">＋ 選擇或拖入 PDF</div>
      <div class="s">整份月報或單張報表皆可</div>
      <input id="file" type="file" accept="application/pdf" hidden>
    </label>
    <label class="ck"><input type="checkbox" id="ocr"> 開啟 OCR 辨識掃描頁</label>
    <button class="act" id="go" disabled>開始辨識</button>
    <span class="ocrTag" id="ocrTag"></span>
  </div>
  <div class="err" id="err"></div>

  <div id="out" style="display:none">
    <div class="cards">
      <div class="card"><div class="l">總頁數</div><div class="v" id="cPages">0</div></div>
      <div class="card"><div class="l">自動辨識段</div><div class="v" id="cAuto">0</div></div>
      <div class="card"><div class="l">待確認段</div><div class="v amber" id="cUnc">0</div></div>
      <div class="card"><div class="l">OCR 命中頁</div><div class="v" id="cOcr">0</div></div>
    </div>

    <h3>段落（依順序）</h3>
    <div class="sec" id="sections"></div>

    <h3>逐頁檢視與校正（下拉可改判各頁屬於哪張表）</h3>
    <div style="margin-bottom:8px"><button class="act" id="recalc">依校正重新整理段落</button></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="foot">辨識服務 v0.1 · 抽字為主、OCR 為輔（需主機已安裝 Tesseract 正體中文）。編碼與目次生成於辨識確認後接續。</div>
</div>

<script>
const NAMES = {
  i1:"基金來源、用途及餘絀表", i2:"主要業務計畫執行明細表", i3:"資本資產明細表",
  i4:"固定資產建設改良擴充執行情形明細表", i5:"平衡表", i6:"收入支出表",
  i7:"預算執行與會計收支對照表", i8:"各項費用彙計表", i9:"平衡表科目明細表",
  i10:"銀行存款差額解釋表", bank:"對帳單", i11:"保管(證)品月報", i12:"保管品對帳單",
  i13:"市有財產增減結存表", i14:"財產折舊月報表", i15:"財產增減月報表", i16:"電腦軟體增減結存表",
  i17:"市有財產增減結存表(半年報)", i18:"財產增減表(半年報)",
  i19:"原始憑證留存代辦、受委託機關（構）、學校或民間團體明細表"
};
const ORDER=["i1","i2","i3","i4","i5","i6","i7","i8","i9","i10","bank","i11","i12","i13","i14","i15","i16","i17","i18","i19"];
let pagesData=[];

const dz=document.getElementById("dz"), fileInput=document.getElementById("file");
let chosen=null;
dz.addEventListener("click",()=>fileInput.click());
fileInput.addEventListener("change",e=>setFile(e.target.files[0]));
dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("over");});
dz.addEventListener("dragleave",()=>dz.classList.remove("over"));
dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("over");
  const f=[...e.dataTransfer.files].find(x=>x.type==="application/pdf"); if(f)setFile(f);});
function setFile(f){ if(!f)return; chosen=f;
  document.getElementById("fname").textContent="📄 "+f.name;
  document.getElementById("go").disabled=false; }

fetch("/api/health").then(r=>r.json()).then(h=>{
  document.getElementById("ocrTag").textContent = h.ocr_available ? "（主機 OCR 可用）" : "（主機未安裝 OCR，開啟無效）";
}).catch(()=>{});

document.getElementById("go").addEventListener("click", recognize);
async function recognize(){
  if(!chosen)return;
  const go=document.getElementById("go"); go.disabled=true; go.textContent="辨識中…";
  document.getElementById("err").textContent="";
  const fd=new FormData();
  fd.append("file",chosen); fd.append("ocr",document.getElementById("ocr").checked); fd.append("thumbnails","true");
  try{
    const r=await fetch("/api/recognize",{method:"POST",body:fd});
    const data=await r.json();
    if(data.error){ document.getElementById("err").textContent=data.error; }
    else render(data);
  }catch(e){ document.getElementById("err").textContent="連線或處理失敗："+e.message; }
  go.disabled=false; go.textContent="開始辨識";
}

function render(data){
  pagesData=data.pages;
  document.getElementById("out").style.display="block";
  document.getElementById("cPages").textContent=data.page_count;
  document.getElementById("cOcr").textContent=data.pages.filter(p=>p.ocr).length;
  renderSections(data.sections);
  renderGrid();
}
function renderSections(sections){
  let auto=0,unc=0; const host=document.getElementById("sections"); host.innerHTML="";
  sections.forEach(s=>{
    if(s.kind==="auto")auto++; if(s.kind==="uncertain")unc++;
    const span=s.start===s.end?`${s.start}`:`${s.start}-${s.end}`;
    const row=document.createElement("div"); row.className="row "+s.kind;
    let cand="";
    if(s.kind==="uncertain"&&s.candidates&&s.candidates.length)
      cand=`<span class="cand">推測應含：${s.candidates.map(c=>c.name.slice(0,10)).join("、")}</span>`;
    row.innerHTML=`<span class="dot ${s.kind}"></span><span class="rng">${span}</span>
      <span>${s.name}</span>${cand}`;
    host.appendChild(row);
  });
  document.getElementById("cAuto").textContent=auto;
  document.getElementById("cUnc").textContent=unc;
}
function renderGrid(){
  const grid=document.getElementById("grid"); grid.innerHTML="";
  pagesData.forEach((p,idx)=>{
    const cell=document.createElement("div"); cell.className="pg k-"+p.kind;
    const opts=['<option value="">— 未指定 —</option>','<option value="front">前置(封面/檢核/目次)</option>']
      .concat(ORDER.map(k=>`<option value="${k}" ${p.key===k?"selected":""}>${NAMES[k]}</option>`)).join("");
    cell.innerHTML=`
      ${p.thumb?`<img src="${p.thumb}" alt="第${p.page}頁">`:""}
      <div class="cap">
        <div class="no">第 ${p.page} 頁${p.ocr?'<span class="ocr">OCR</span>':''}</div>
        <div class="lb">${p.label||""}</div>
        <select data-idx="${idx}">${opts}</select>
      </div>`;
    grid.appendChild(cell);
  });
  grid.querySelectorAll("select").forEach(sel=>sel.addEventListener("change",e=>{
    const i=+e.target.dataset.idx; const v=e.target.value;
    pagesData[i].key = v && v!=="front" ? v : null;
    pagesData[i].kind = v==="front" ? "front" : (v ? "text" : "scan");
    pagesData[i].label = v==="front" ? "前置" : (v ? NAMES[v] : "（待指定）");
  }));
}
document.getElementById("recalc").addEventListener("click",()=>{
  // 依逐頁 key 於前端重建段落
  const sections=[]; let cur=null;
  const close=()=>{ if(cur){sections.push(cur);cur=null;} };
  pagesData.forEach(p=>{
    if(p.kind==="front"){ close();
      if(!sections.length||sections[sections.length-1].kind!=="front")
        sections.push({kind:"front",name:"封面／檢核表／目次（前置）",start:p.page,end:p.page});
      else sections[sections.length-1].end=p.page; return; }
    if(p.key){ if(cur&&cur.key===p.key)cur.end=p.page;
      else{ close(); cur={kind:"auto",key:p.key,name:NAMES[p.key],start:p.page,end:p.page}; } }
    else{ if(cur&&cur.kind==="uncertain")cur.end=p.page;
      else{ close(); cur={kind:"uncertain",name:"待確認",start:p.page,end:p.page}; } }
  });
  close();
  renderSections(sections);
});
</script>
</body>
</html>
